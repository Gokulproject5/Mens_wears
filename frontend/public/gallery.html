<!DOCTYPE html>
<html>
<head>
    <style>
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .item { border: 2px solid #eee; border-radius: 8px; padding: 10px; text-align: center; background: #fff; }
        img { max-width: 100%; height: auto; border-radius: 4px; }
        .id { font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body style="background: #f4f4f4; font-family: sans-serif;">
    <h1 style="text-align: center;">Menswear Image Classification</h1>
    <div id="gallery" class="gallery"></div>
    <script>
        const gallery = document.getElementById('gallery');
        // We know there are assets from 0 to around 250
        const extensions = ['jpeg', 'png', 'jpg'];
        for (let i = 0; i <= 250; i++) {
            extensions.forEach(ext => {
                const img = new Image();
                const src = `assets/asset ${i}.${ext}`;
                img.src = src;
                img.onload = () => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.innerHTML = `
                        <span class="id">Asset ${i}</span>
                        <img src="${src}">
                        <div style="margin-top: 10px;">${src.split('/').pop()}</div>
                    `;
                    gallery.appendChild(div);
                };
            });
        }
    </script>
</body>
</html>
